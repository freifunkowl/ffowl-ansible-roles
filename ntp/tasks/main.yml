---

- name: Disable systemd-timesyncd
  systemd:
    name: systemd-timesyncd
    state: stopped
    masked: yes
  ignore_errors: yes

- name: Disable systemd-timesyncd (bash)
  shell: |
    set -o pipefail
    systemctl disable systemd-timesyncd ||:
  args:
    executable: bash

- name: Install ntp
  apt:
    name: ntpsec

- name: Install ntpdate
  apt:
    name: ntpsec-ntpdate

- name: Install ntp.conf
  template:
    src: ntp.conf.j2
    dest: /etc/ntpsec.conf
  notify: Restart ntpd

- name: create folder for ntp service override file
  file:
    path: /etc/systemd/system/ntpsec.service.d
    state: directory
    mode: 0755

- name: override ntp service
  template:
    src: ntp.service.override.j2
    dest: /etc/systemd/system/ntpsec.service.d/ansible-managed.conf
  notify:
    - reread systemd configs
